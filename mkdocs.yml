site_name: BeyondSight Documentation
site_description: Hybrid social dynamics simulator — Numerical core + LLM as regime selector.
theme:
  name: material
  palette:
    scheme: slate
    primary: blue
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

nav:
  - Home: index.md
  - API Reference: api.md
  - Spanish Version: README_ES.md
  - Validation (PVU-BS):
      - Overview: validation/README.md
      - Protocol (EN): validation/PVU_BeyondSight_EN.md
      - Protocolo (ES): validation/PVU_BeyondSight_ES.md
      - Pre-registration (EN): validation/preregistration_template_EN.md
      - Pre-registro (ES): validation/preregistration_template_ES.md
      - Report template (EN): validation/validation_report_template_EN.md
      - Plantilla de reporte (ES): validation/validation_report_template_ES.md
