[mypy]
python_version = 3.11
strict = False
ignore_missing_imports = True
warn_unused_ignores = True
warn_return_any = False
check_untyped_defs = False
pretty = True
# Gradual adoption: do not type-check the entire monorepo via import chains.
follow_imports = silent
show_error_codes = True
namespace_packages = True
explicit_package_bases = True

# ── FASE 2 slice ──────────────────────────────────────────────────────
[mypy-services.*]
disallow_untyped_defs = True

[mypy-massive_core.utils.rng]
disallow_untyped_defs = True

[mypy-forecast.targets]
disallow_untyped_defs = True

# ── FASE 5 B4 slice: numerics + config + diagnostics + assimilation ───
[mypy-massive_core.numerics.*]
disallow_untyped_defs = True

[mypy-massive_core.config.*]
disallow_untyped_defs = True

[mypy-massive_core.diagnostics.*]
disallow_untyped_defs = True

[mypy-massive_core.data_assimilation.*]
disallow_untyped_defs = True

[mypy-massive_core.analysis.*]
disallow_untyped_defs = True

# Sparse engine is large / legacy-shaped; keep typed-defs policy but allow
# incomplete internal typing until a dedicated cleanup PR.
[mypy-massive_core.numerics.multilayer_engine_sparse]
disallow_untyped_defs = False
check_untyped_defs = False
