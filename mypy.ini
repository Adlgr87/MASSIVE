[mypy]
python_version = 3.11
strict = False
ignore_missing_imports = True
warn_unused_ignores = True
warn_return_any = False
check_untyped_defs = False
pretty = True

# Gradual typing: start with service layer and public utils
[mypy-services.*]
disallow_untyped_defs = False

[mypy-massive_core.utils.rng]
disallow_untyped_defs = True

[mypy-forecast.targets]
disallow_untyped_defs = True
