[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
logfile_maxbytes=50M
logfile_backups=3
loglevel=info

[program:api]
command=uvicorn api:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/api.log
stderr_logfile=/var/log/api_err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

[program:streamlit]
command=streamlit run app.py --server.port=8501 --server.headless=true --browser.gatherUsageStats=false
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/streamlit.log
stderr_logfile=/var/log/streamlit_err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx.log
stderr_logfile=/var/log/nginx_err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
