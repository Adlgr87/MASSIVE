name: Docker E2E Health

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  docker-health:
    name: compose-build-health
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal env files
        run: |
          touch .env .env.local
          echo "MASSIVE_API_KEY=ci-test-key" >> .env
          echo "MASSIVE_CORS_ORIGINS=http://localhost:3000" >> .env

      - name: Build image
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for API /docs health
        run: |
          set -e
          for i in $(seq 1 40); do
            if curl -fsS "http://127.0.0.1:8000/docs" >/dev/null 2>&1; then
              echo "API healthy after ${i} attempts"
              exit 0
            fi
            if curl -fsS "http://127.0.0.1:8000/health" >/dev/null 2>&1; then
              echo "API /health OK after ${i} attempts"
              exit 0
            fi
            echo "waiting ($i)..."
            sleep 5
          done
          echo "=== container logs ==="
          docker compose logs --no-color | tail -200
          exit 1

      - name: Smoke endpoints
        run: |
          curl -fsS "http://127.0.0.1:8000/health" | tee /tmp/health.json
          curl -fsS -o /dev/null -w "%{http_code}\n" "http://127.0.0.1:8000/docs"

      - name: Tear down
        if: always()
        run: docker compose down -v
