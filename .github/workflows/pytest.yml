name: MASSIVE CI Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  core:
    name: core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=1.26" "scipy>=1.12" "pandas>=2.2" "networkx>=3.0" \
            "pydantic>=2.0" "pyyaml>=6.0" "python-dotenv>=1.0.1" "pytest>=8.0" \
            "numba>=0.65" "plotly>=5.18" "requests>=2.31"
      - name: Core tests
        run: |
          PYTHONHASHSEED=42 python -m pytest tests/test_simulator.py tests/test_massive_engine.py \
            tests/test_multilayer.py tests/test_contracts.py tests/test_optimization.py \
            tests/test_uil_mappings.py -q --tb=line

  scientific:
    name: scientific
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scientific deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Scientific tests
        run: |
          PYTHONHASHSEED=42 python -m pytest tests/test_scientific_integration.py \
            tests/test_scientific_runner.py tests/test_data_assimilation_workflow.py \
            tests/test_energy_core.py tests/test_integrated_dynamics.py -q --tb=line

  api:
    name: api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" python-multipart pydantic pytest httpx numpy scipy
      - name: API smoke import
        run: |
          python -c "from api import app; print(app.title)"
          PYTHONHASHSEED=42 python -m pytest tests/test_api_security.py -q --tb=line

  full:
    name: full-suite
    runs-on: ubuntu-latest
    needs: [core, scientific, api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install full requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Full pytest
        run: |
          PYTHONHASHSEED=42 python -m pytest tests/ -q --tb=line
