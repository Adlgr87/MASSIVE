name: Typecheck slice (non-blocking)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  typecheck:
    name: mypy-slice
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install typecheck deps
        run: |
          python -m pip install --upgrade pip
          pip install "mypy>=1.8" "numpy>=1.26" "scipy>=1.12" "pydantic>=2.0" "pyyaml>=6.0"
      - name: Run gradual type slice
        run: python scripts/typecheck_slice.py
